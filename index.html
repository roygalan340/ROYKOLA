<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROYKOLA DIGITAL</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#000;color:#fff;}
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(0,0,0,.9);
position:sticky;
top:0;
z-index:999;
}
.logo{font-size:35px;font-weight:bold;color:red;}
.logo span{display:block;font-size:12px;letter-spacing:4px;color:#fff;}
nav a{color:#fff;text-decoration:none;margin:0 15px;}
.hero{
height:70vh;
background:
linear-gradient(to right,#000 20%,rgba(0,0,0,.4)),
url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=1200&q=80') center/cover;
display:flex;
align-items:center;
padding:40px;
}
.hero-text h1{font-size:70px;line-height:70px;}
.hero-text span{color:red;}
.hero-text p{margin:20px 0;font-size:20px;}
.btn{
display:inline-block;
padding:15px 25px;
background:red;
color:#fff;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}
.section{padding:30px;}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}
.card{
background:#111;
border-radius:10px;
overflow:hidden;
}
.card img{
width:100%;
height:180px;
object-fit:cover;
}
.card p{padding:10px;}
.sidebar{
position:fixed;
right:10px;
top:100px;
width:320px;
background:#111;
border-radius:15px;
padding:20px;
max-height:85vh;
overflow:auto;
}
input{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:8px;
}
button{
width:100%;
padding:12px;
background:red;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-top:5px;
}
.queue-item{
display:flex;
align-items:center;
background:#222;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}
.queue-item img{
width:55px;
height:55px;
border-radius:8px;
margin-right:10px;
}
footer{text-align:center;padding:30px;color:#999;}
@media(max-width:900px){
.sidebar{
position:relative;
width:95%;
margin:auto;
top:0;
right:0;
}
.hero-text h1{
font-size:45px;
line-height:45px;
}
}
</style>
</head>
<body>

<header>
<div class="logo">ROYKOLA <span>DIGITAL</span></div>
<nav>
<a href="#">INICIO</a>
<a href="#">EXPLORAR</a>
<a href="#">TOP</a>
</nav>
</header>

<section class="hero">
<div class="hero-text">
<h1>PIDE TU <br><span>CANCIÓN</span></h1>
<p>Prueba tu música ahora.</p>
<a href="#pedido" class="btn">🎵 PEDIR</a>
</div>
</section>

<section class="section">
<h2>Categorías</h2>
<div class="grid">
<div class="card"><img src="https://picsum.photos/200/300?1"><p>Reggaetón</p></div>
<div class="card"><img src="https://picsum.photos/200/300?2"><p>Cumbia</p></div>
<div class="card"><img src="https://picsum.photos/200/300?3"><p>Rock</p></div>
<div class="card"><img src="https://picsum.photos/200/300?4"><p>Románticas</p></div>
</div>
</section>

<div class="sidebar" id="pedido">
<h2>🎵 Cola de reproducción</h2>

<input type="text" id="nombre" placeholder="Tu nombre">
<input type="text" id="cancion" placeholder="Pega link de YouTube">
<button onclick="agregarCancion()">Agregar y abrir</button>

<h2 style="margin-top:20px;">Lista</h2>
<div id="cola"></div>
</div>

<footer>
© 2026 Roykola Digital
</footer>

<script>
let cola = JSON.parse(localStorage.getItem("cola")) || [];
let creditos = 3;

function guardarCola(){
localStorage.setItem("cola", JSON.stringify(cola));
mostrarCola();
}

function agregarCancion(){
let nombre=document.getElementById("nombre").value;
let cancion=document.getElementById("cancion").value;

if(creditos <= 0){
alert("Sin créditos. Realiza un pago.");
return;
}

if(nombre===""||cancion===""){
alert("Completa los datos");
return;
}

creditos--;

cola.push({nombre,cancion});
guardarCola();

window.open(cancion, "_blank");

alert("Te quedan " + creditos + " créditos");

document.getElementById("nombre").value="";
document.getElementById("cancion").value="";
}

function mostrarCola(){
let div=document.getElementById("cola");
div.innerHTML="";

cola.forEach(item=>{
div.innerHTML += `
<div class="queue-item">
<img src="https://picsum.photos/60?random=${Math.random()}">
<div>
<b>${item.nombre}</b><br>
${item.cancion}
</div>
</div>`;
});
}

mostrarCola();
</script>

</body>
</html>
